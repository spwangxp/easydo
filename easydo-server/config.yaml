# EasyDo Server Configuration
# 
# 重要：生产环境请通过环境变量覆盖以下配置
# 在 Docker 部署时，使用 environment 字段传递敏感信息

server:
  port: 8080
  mode: debug  # debug / release

database:
  # 通过环境变量覆盖: DB_HOST, DB_PORT, DB_USERNAME, DB_PASSWORD, DB_NAME
  host: ""     
  port: 3306
  username: ""
  password: ""
  name: ""
  max_open_conns: 100
  max_idle_conns: 10
  max_life_time: 1h

redis:
  # 通过环境变量覆盖: REDIS_HOST, REDIS_PORT, REDIS_PASSWORD, REDIS_DB
  host: ""
  port: 6379
  password: ""  # 无密码留空
  db: 0
  pool_size: 10

jwt:
  # 通过环境变量覆盖: JWT_SECRET
  secret: ""
  expire: 24h
