# EasyDo Server Configuration
# 
# 重要：生产环境请通过环境变量覆盖以下配置
# 在 Docker 部署时，使用 environment 字段传递敏感信息

server:
  port: 8080
  mode: release
  id: ""
  public_url: ""
  internal_url: ""
  internal_token: ""

database:
  # 通过环境变量覆盖: DB_HOST, DB_PORT, DB_USERNAME, DB_PASSWORD, DB_NAME
  host: ""     
  port: 3306
  username: ""
  password: ""
  name: ""
  max_open_conns: 100
  max_idle_conns: 10
  max_life_time: 1h

redis:
  # 通过环境变量覆盖: REDIS_HOST, REDIS_PORT, REDIS_PASSWORD, REDIS_DB
  host: ""
  port: 6379
  password: ""  # 无密码留空
  db: 0
  pool_size: 10

jwt:
  # 通过环境变量覆盖: JWT_SECRET
  secret: ""
  expire: 24h

auth:
  # 通过环境变量覆盖: AUTH_TOKEN_TTL, AUTH_REFRESH_INTERVAL
  token_ttl: 4h
  refresh_interval: 10m

task:
  lease_ttl: 2m
  dispatch_timeout: 30s

logging:
  live_buffer_max_chunks: 1024
  segment_max_lines: 200
  segment_flush_interval: 5s

object_storage:
  provider: s3
  endpoint: ""
  bucket: easydo-logs
  use_ssl: false
  access_key: ""
  secret_key: ""
  region: us-east-1

notification:
  smtp:
    enabled: false
    host: ""
    port: 25
    username: ""
    password: ""
    from_address: ""
    from_name: EasyDo
