services:
  frontend:
    build:
      context: ../../easydo-frontend
      dockerfile: Dockerfile
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        GIT_COMMIT_SHORT: ${GIT_COMMIT_SHORT:-unknown}
        GIT_DATE: ${GIT_DATE:-unknown}
    ports:
      - "8088:80"
    depends_on:
      - server-lb
    networks:
      - easydo-network
    restart: unless-stopped

  server-lb:
    image: nginx:alpine
    depends_on:
      - server
      - server2
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.server-lb.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - easydo-network
    restart: unless-stopped

  server:
    build:
      context: ../../easydo-server
      dockerfile: Dockerfile
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        GIT_COMMIT_SHORT: ${GIT_COMMIT_SHORT:-unknown}
        GIT_DATE: ${GIT_DATE:-unknown}
    environment:
      - SERVER_PORT=8080
      - SERVER_MODE=release
      - SERVER_ID=server-1
      - SERVER_PUBLIC_URL=http://localhost:8088
      - SERVER_INTERNAL_URL=http://server:8080
      - SERVER_INTERNAL_TOKEN=easydo-internal-token
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USERNAME=root
      - DB_PASSWORD=password
      - DB_NAME=easydo
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - JWT_SECRET=easydo-secret-key
      - AUTH_TOKEN_TTL=4h
      - AUTH_REFRESH_INTERVAL=10m
      - OBJECT_STORAGE_PROVIDER=s3
      - OBJECT_STORAGE_ENDPOINT=minio:9000
      - OBJECT_STORAGE_BUCKET=easydo-logs
      - OBJECT_STORAGE_USE_SSL=false
      - OBJECT_STORAGE_ACCESS_KEY=minioadmin
      - OBJECT_STORAGE_SECRET_KEY=minioadmin
      - OBJECT_STORAGE_REGION=us-east-1
      - NOTIFICATION_SMTP_ENABLED=${NOTIFICATION_SMTP_ENABLED:-true}
      - NOTIFICATION_SMTP_HOST=${NOTIFICATION_SMTP_HOST:-127.0.0.1}
      - NOTIFICATION_SMTP_PORT=${NOTIFICATION_SMTP_PORT:-25}
      - NOTIFICATION_SMTP_FROM_ADDRESS=${NOTIFICATION_SMTP_FROM_ADDRESS:-noreply@easydo.local}
      - NOTIFICATION_SMTP_FROM_NAME=${NOTIFICATION_SMTP_FROM_NAME:-EasyDo}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - easydo-network
    restart: unless-stopped

  server2:
    build:
      context: ../../easydo-server
      dockerfile: Dockerfile
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        GIT_COMMIT_SHORT: ${GIT_COMMIT_SHORT:-unknown}
        GIT_DATE: ${GIT_DATE:-unknown}
    environment:
      - SERVER_PORT=8080
      - SERVER_MODE=release
      - SERVER_ID=server-2
      - SERVER_PUBLIC_URL=http://localhost:8088
      - SERVER_INTERNAL_URL=http://server2:8080
      - SERVER_INTERNAL_TOKEN=easydo-internal-token
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USERNAME=root
      - DB_PASSWORD=password
      - DB_NAME=easydo
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - JWT_SECRET=easydo-secret-key
      - AUTH_TOKEN_TTL=4h
      - AUTH_REFRESH_INTERVAL=10m
      - OBJECT_STORAGE_PROVIDER=s3
      - OBJECT_STORAGE_ENDPOINT=minio:9000
      - OBJECT_STORAGE_BUCKET=easydo-logs
      - OBJECT_STORAGE_USE_SSL=false
      - OBJECT_STORAGE_ACCESS_KEY=minioadmin
      - OBJECT_STORAGE_SECRET_KEY=minioadmin
      - OBJECT_STORAGE_REGION=us-east-1
      - NOTIFICATION_SMTP_ENABLED=${NOTIFICATION_SMTP_ENABLED:-true}
      - NOTIFICATION_SMTP_HOST=${NOTIFICATION_SMTP_HOST:-127.0.0.1}
      - NOTIFICATION_SMTP_PORT=${NOTIFICATION_SMTP_PORT:-25}
      - NOTIFICATION_SMTP_FROM_ADDRESS=${NOTIFICATION_SMTP_FROM_ADDRESS:-noreply@easydo.local}
      - NOTIFICATION_SMTP_FROM_NAME=${NOTIFICATION_SMTP_FROM_NAME:-EasyDo}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - easydo-network
    restart: unless-stopped

  db:
    image: mariadb:11.4
    ports:
      - "3306:3306"
    environment:
      - MARIADB_ROOT_PASSWORD=password
      - MARIADB_DATABASE=easydo
      - MARIADB_CHARACTER_SET_SERVER=utf8mb4
      - MARIADB_COLLATION_SERVER=utf8mb4_unicode_ci
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -ppassword"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - easydo-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - easydo-network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - easydo-network
    restart: unless-stopped

  agent:
    build:
      context: ../../easydo-agent
      dockerfile: Dockerfile
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        GIT_COMMIT_SHORT: ${GIT_COMMIT_SHORT:-unknown}
        GIT_DATE: ${GIT_DATE:-unknown}
    depends_on:
      server-lb:
        condition: service_started
    environment:
      - EASYDO_SERVER_URL=http://server-lb:8080
      - AGENT_NAME=easydo-agent-1
    volumes:
      - agent1_data:/data/agent
    privileged: true
    networks:
      - easydo-network
    restart: unless-stopped

  agent2:
    build:
      context: ../../easydo-agent
      dockerfile: Dockerfile
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        GIT_COMMIT_SHORT: ${GIT_COMMIT_SHORT:-unknown}
        GIT_DATE: ${GIT_DATE:-unknown}
    depends_on:
      server-lb:
        condition: service_started
    environment:
      - EASYDO_SERVER_URL=http://server-lb:8080
      - AGENT_NAME=easydo-agent-2
    volumes:
      - agent2_data:/data/agent
    privileged: true
    networks:
      - easydo-network
    restart: unless-stopped

networks:
  easydo-network:
    driver: bridge

volumes:
  mariadb_data:
  redis_data:
  minio_data:
  agent1_data:
  agent2_data:
